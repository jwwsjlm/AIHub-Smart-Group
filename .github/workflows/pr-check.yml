name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate userscript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull request
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Check repository contracts
        run: node scripts/check-repository.cjs

      - name: Check JavaScript syntax
        run: node --check aihub-smart-group.user.js

      - name: Run tests
        run: node --test tests/*.test.cjs

      - name: Run ESLint
        run: npx --yes eslint@9.39.2 aihub-smart-group.user.js scripts/check-repository.cjs tests/*.test.cjs
