name: PR Report Bot

on:
  workflow_run:
    workflows: [PR Check]
    types: [completed]

permissions:
  issues: write
  pull-requests: read

jobs:
  report:
    name: Publish pull request report
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create or update report comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const marker = '<!-- aihub-smart-group-pr-report -->';
            const run = context.payload.workflow_run;
            const pullRequest = run.pull_requests?.[0];
            if (!pullRequest) {
              core.notice('No pull request is associated with this workflow run.');
              return;
            }

            const { owner, repo } = context.repo;
            const number = pullRequest.number;
            const [{ data: initialPr }, { data: files }, { data: commits }] = await Promise.all([
              github.rest.pulls.get({ owner, repo, pull_number: number }),
              github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: number, per_page: 100 }),
              github.paginate(github.rest.pulls.listCommits, { owner, repo, pull_number: number, per_page: 100 }),
            ]);

            let pr = initialPr;
            if (pullRequest.head?.sha && pullRequest.head.sha !== pr.head.sha) {
              core.notice('Ignoring a completed check for an outdated pull request revision.');
              return;
            }
            for (let attempt = 0; pr.mergeable === null && attempt < 3; attempt += 1) {
              await new Promise((resolve) => setTimeout(resolve, 2000));
              ({ data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: number }));
            }

            const conclusion = run.conclusion || 'unknown';
            const passed = conclusion === 'success';
            const mergeReady = passed && !pr.draft && pr.mergeable === true;
            const mergeText = mergeReady ? '建议合并' : '暂不可合并';
            const checkText = passed ? '全部自动检查通过' : `自动检查结果：${conclusion}`;
            const fileRows = files.slice(0, 30).map((file) =>
              `| \`${file.filename}\` | ${file.status} | +${file.additions} / -${file.deletions} |`
            );
            if (files.length > 30) fileRows.push(`| 其余 ${files.length - 30} 个文件 | 省略 | - |`);
            const commitRows = commits.slice(0, 20).map((commit) => {
              const title = commit.commit.message.split('\n')[0].replace(/\|/g, '\\|');
              return `- \`${commit.sha.slice(0, 7)}\` ${title}`;
            });
            if (commits.length > 20) commitRows.push(`- 其余 ${commits.length - 20} 个提交已省略`);

            const description = (pr.body || '').trim() || '_PR 作者尚未填写修改说明。_';
            const body = [
              marker,
              '## PR 自动检查报告',
              '',
              `**结论：${mergeText}**`,
              '',
              '| 项目 | 结果 |',
              '| --- | --- |',
              `| 自动检查 | ${checkText} |`,
              `| Draft | ${pr.draft ? '是' : '否'} |`,
              `| GitHub 可合并状态 | ${pr.mergeable === true ? '无冲突' : pr.mergeable === false ? '存在冲突' : '检查中'} |`,
              `| 修改规模 | ${pr.changed_files} 个文件，+${pr.additions} / -${pr.deletions} |`,
              '',
              `[查看本次检查日志](${run.html_url})`,
              '',
              '### 修改文件',
              '',
              '| 文件 | 状态 | 变更 |',
              '| --- | --- | --- |',
              fileRows.join('\n') || '| 无 | - | - |',
              '',
              '### 提交记录',
              '',
              commitRows.join('\n') || '_无提交记录_',
              '',
              '<details>',
              '<summary>PR 作者填写的修改说明</summary>',
              '',
              description,
              '',
              '</details>',
              '',
              '> 此报告仅表示自动检查结果，不代替维护者对业务逻辑和安全性的人工审核。',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
            }
